<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Location Demo (HTML5 Geolocation)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 16px;
    }
    #status {
      margin-bottom: 12px;
      color: #333;
    }
    #location {
      font-weight: bold;
      color: #0066cc;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
    }
    .error {
      color: #cc0000;
    }
  </style>
</head>
<body>
  <h1>HTML5 Geolocation</h1>

  <p id="status">click here to continue</p>
  <p id="location"></p>

  <button onclick="getLocation()">continue</button>

  <script>
    const statusEl = document.getElementById('status');
    const locationEl = document.getElementById('location');

    function getLocation() {
      // Check if geolocation is supported
      if (!navigator.geolocation) {
        statusEl.textContent = 'Geolocation is not supported by this browser.';
        statusEl.className = 'error';
        return;
      }

      statusEl.textContent = 'wait for a moment...';

      navigator.geolocation.getCurrentPosition(success, error);
    }

    function success(position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const acc = position.coords.accuracy; // meters

      statusEl.textContent = 'Location received:';
      statusEl.className = '';

      locationEl.innerHTML =
        'Latitude: ' + lat +
        '<br>Longitude: ' + lon +
        '<br>Accuracy: ' + acc + ' meters';
    }

    function error(err) {
      let message = '';

      switch (err.code) {
        case err.PERMISSION_DENIED:
          message = 'User denied the request for Geolocation.';
          break;
        case err.POSITION_UNAVAILABLE:
          message = 'Location information is unavailable.';
          break;
        case err.TIMEOUT:
          message = 'The request to get user location timed out.';
          break;
        default:
          message = 'An unknown error occurred.';
          break;
      }

      statusEl.textContent = message;
      statusEl.className = 'error';
      locationEl.textContent = '';
    }
  </script>
</body>
</html>
